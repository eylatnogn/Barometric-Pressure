name: Deploy to GitHub Pages

# Publishes the app to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Requires a one-time setup: repo Settings -> Pages -> Build and
      # deployment -> Source: "GitHub Actions". (The Actions token can't
      # create the Pages site itself, so this toggle is done once by hand.)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
